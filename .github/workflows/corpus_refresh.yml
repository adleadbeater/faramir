name: Faramir Corpus Refresh
on:
  schedule:
    - cron: '0 9 1 * *'    # 1st of month, 4am ET
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python scripts/build_corpus.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          FARAMIR_SHEET_ID: ${{ secrets.FARAMIR_SHEET_ID }}

      - name: Commit refreshed corpus
        run: |
          git config user.name "faramir-bot"
          git config user.email "faramir-bot@users.noreply.github.com"
          git add data/corpus.json
          git diff --staged --quiet || git commit -m "corpus refresh $(date -I)"
          git push
